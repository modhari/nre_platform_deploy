apiVersion: apps/v1
kind: Deployment
metadata:
  name: lattice
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.lattice.replicaCount }}
  selector:
    matchLabels:
      app: lattice
  template:
    metadata:
      labels:
        app: lattice
    spec:
      containers:
        - name: lattice
          image: "{{ .Values.lattice.image.repository }}:{{ .Values.lattice.image.tag }}"
          imagePullPolicy: {{ .Values.lattice.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.lattice.service.port }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ .Values.lattice.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ .Values.lattice.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.lattice.resources | nindent 12 }}
