apiVersion: apps/v1
kind: Deployment
metadata:
  name: nre-agent
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.nreAgent.replicaCount }}
  selector:
    matchLabels:
      app: nre-agent
  template:
    metadata:
      labels:
        app: nre-agent
    spec:
      containers:
        - name: nre-agent
          image: "{{ .Values.nreAgent.image.repository }}:{{ .Values.nreAgent.image.tag }}"
          imagePullPolicy: {{ .Values.nreAgent.image.pullPolicy }}
          env:
            - name: NRE_AGENT_SCENARIO
              value: "{{ .Values.nreAgent.env.NRE_AGENT_SCENARIO }}"
            - name: NRE_AGENT_INTERVAL_SECONDS
              value: "{{ .Values.nreAgent.env.NRE_AGENT_INTERVAL_SECONDS }}"
            - name: NRE_AGENT_APPROVAL_DIR
              value: "{{ .Values.nreAgent.env.NRE_AGENT_APPROVAL_DIR }}"
            - name: NRE_AGENT_APPROVAL_STATUS
              value: "{{ .Values.nreAgent.env.NRE_AGENT_APPROVAL_STATUS }}"
            - name: NRE_AGENT_APPROVAL_COOLDOWN_SECONDS
              value: "{{ .Values.nreAgent.env.NRE_AGENT_APPROVAL_COOLDOWN_SECONDS }}"
            - name: NRE_AGENT_API_HOST
              value: "{{ .Values.nreAgent.env.NRE_AGENT_API_HOST }}"
            - name: NRE_AGENT_API_PORT
              value: "{{ .Values.nreAgent.env.NRE_AGENT_API_PORT }}"
          ports:
            - containerPort: {{ .Values.nreAgent.service.port }}
          volumeMounts:
            - name: nre-agent-approvals
              mountPath: {{ .Values.nreAgent.persistence.mountPath }}
          resources:
            {{- toYaml .Values.nreAgent.resources | nindent 12 }}
      volumes:
        - name: nre-agent-approvals
          persistentVolumeClaim:
            claimName: nre-agent-approvals
