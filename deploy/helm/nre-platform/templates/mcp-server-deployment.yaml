apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.mcpServer.replicaCount }}
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: "{{ .Values.mcpServer.image.repository }}:{{ .Values.mcpServer.image.tag }}"
          imagePullPolicy: {{ .Values.mcpServer.image.pullPolicy }}
          env:
            - name: MCP_AUDIT_PATH
              value: "{{ .Values.mcpServer.env.MCP_AUDIT_PATH }}"
          ports:
            - containerPort: {{ .Values.mcpServer.service.port }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.mcpServer.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.mcpServer.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.mcpServer.resources | nindent 12 }}
