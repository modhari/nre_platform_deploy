# ---------------------------------------------------------------------
# Global configuration
# ---------------------------------------------------------------------
global:
  namespace: nre-platform


# ---------------------------------------------------------------------
# LATTICE (orchestration + planning engine)
# ---------------------------------------------------------------------
lattice:
  replicaCount: 1

  image:
    repository: ghcr.io/modhari/lattice
    tag: "0.1.8"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  env:
    # Enable MCP integration
    USE_MCP: "true"

    # Internal service DNS for MCP
    MCP_SERVER_URL: "http://mcp-server:8080"

    # Auth boundary (must match MCP expectations)
    MCP_AUTH_TOKEN: "change_me"

    # Future: request signing
    MCP_HMAC_SECRET: "change_me_too"

    # Default fallback scenario (used if no request body provided)
    NRE_SCENARIO: "leaf_bgp_disable"

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"


# ---------------------------------------------------------------------
# MCP SERVER (policy + risk evaluation boundary)
# ---------------------------------------------------------------------
mcpServer:
  replicaCount: 1

  image:
    repository: ghcr.io/modhari/mcp_server
    tag: "0.1.17"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  env:
    # Expected auth token (must match lattice)
    MCP_AUTH_TOKEN: "change_me"

    # Future: request signing validation
    MCP_HMAC_SECRET: "change_me_too"

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"


# ---------------------------------------------------------------------
# NRE AGENT (outer decision loop)
# ---------------------------------------------------------------------
nreAgent:
  replicaCount: 1

  image:
    repository: ghcr.io/modhari/nre_agent
    tag: "0.1.11"
    pullPolicy: IfNotPresent
  service:
    port: 8090
  env:
    # Controls which scenario agent selects
    # Change this to test different behaviors
    NRE_AGENT_SCENARIO: ""
    NRE_AGENT_INTERVAL_SECONDS: "30"
    NRE_AGENT_APPROVAL_DIR: "/data/nre_agent_approvals"
    NRE_AGENT_APPROVAL_STATUS: ""
    NRE_AGENT_APPROVAL_COOLDOWN_SECONDS: "300"
    NRE_AGENT_API_HOST: "0.0.0.0"
    NRE_AGENT_API_PORT: "8090"
  persistence:
    #Mount path where approval JSON records are stored
    mountPath: "/data/nre_agent_approvals"
    # Small persistent volume is enough for JSPN approvals records.
    size: "1Gi"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
