global:
  namespace: nre-platform
  environment: dev

lattice:
  replicaCount: 1
  image:
    repository: ghcr.io/modhari/lattice
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

mcpServer:
  replicaCount: 1
  image:
    repository: ghcr.io/modhari/mcp_server
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    port: 8080
  env:
    MCP_AUDIT_PATH: /tmp/mcp_audit.jsonl
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
